# Dependabot — dependency scanning/updates gate.
# Ecosystems: NuGet (src/tests package graph) + GitHub Actions (SHA-pinned workflows).
# github-actions updates keep the pinned action SHAs current.
version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
    # Keep the paired codeql-action steps (init + analyze) on the same version:
    # bumping only one half breaks CodeQL ("Loaded a configuration file for
    # version X, but running version Y"). Grouping lands both in one PR.
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action*"
