# Skanowanie sekretów — bramka 6 (TESTING-SPEC.md §8). gitleaks jako przenośna, uruchamialna
# w CI bramka (na pustym szkielecie brak sekretów → zielono).
# Natywne GitHub secret scanning + push protection to USTAWIENIA repozytorium (nie plik) —
# włączyć w Settings → Code security po wypchnięciu repo (follow-up, DEC-1/SEC-4).
# Uwaga (SEC-2): dla repozytoriów należących do organizacji gitleaks-action może wymagać
# sekretu GITLEAKS_LICENSE; dla repo osobistych/publicznych nie jest wymagany.
# Akcje przypięte do SHA (SEC-1); Dependabot (github-actions) utrzymuje je.
name: Secret Scan

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: "Gate 6 — secret scan (gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
