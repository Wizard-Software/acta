# Secret scan — gate 6. Runs the gitleaks CLI directly (license-free)
# instead of gitleaks-action, which requires a paid GITLEAKS_LICENSE for organization repos.
# On an empty skeleton there are no secrets, so the gate is green.
# Native GitHub secret scanning + push protection are repository SETTINGS (not a file) —
# enable them in Settings -> Code security after pushing the repo (follow-up).
# The gitleaks version is pinned; Dependabot cannot bump it, so review it manually.
name: Secret Scan

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: "Gate 6 — secret scan (gitleaks CLI)"
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.21.2"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Install gitleaks CLI (license-free)
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks version
      - name: Run secret scan
        run: ./gitleaks detect --source . --redact --no-banner --exit-code 1
