# CodeQL — SAST gate. Complements the Roslyn security analyzers (CA3xxx/CA5xxx as errors,
# already enforced in gate 1 via Directory.Build.props).
# build-mode: none — scans C# sources without compiling (works on an empty skeleton).
#   Fallback if a given codeql-action version does not support none for csharp:
#   set `build-mode: manual` and add a `dotnet build Acta.slnx -c Release -p:ContinuousIntegrationBuild=true`
#   step between init and analyze.
# Actions are pinned to SHAs; Dependabot (github-actions) keeps them current.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # every Monday 03:27 UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: "Gate 4 — CodeQL (SAST)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [csharp]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: none
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:${{ matrix.language }}"
