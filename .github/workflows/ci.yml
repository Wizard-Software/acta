# CI — quality gates 1, 2, 3, 5, chained in order via `needs:`.
# Gate 4 (SAST/CodeQL) and gate 6 (secrets) live in separate workflows (codeql.yml, secret-scan.yml).
# The pipeline stays green on an empty solution skeleton.
# Actions are pinned to SHAs (determinism); Dependabot (github-actions) keeps them current.
name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_NOLOGO: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  # ── Gate 1: build + tests (in-memory + Testcontainers) ────────────────────
  build-test:
    name: "Gate 1 — build + tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      # Locked-mode restore: -p:ContinuousIntegrationBuild=true activates RestoreLockedMode
      # from Directory.Build.props (validates packages.lock.json — NuGet graph determinism).
      - name: Restore (locked)
        run: dotnet restore Acta.slnx -p:ContinuousIntegrationBuild=true
      - name: Build (Release)
        run: dotnet build Acta.slnx -c Release --no-restore -p:ContinuousIntegrationBuild=true
      # ubuntu-latest has Docker -> Testcontainers (Postgres) will work once integration
      # tests appear. On the empty skeleton the test count is 0 -> success.
      - name: Test (in-memory + Testcontainers)
        run: dotnet test Acta.slnx -c Release --no-build -p:ContinuousIntegrationBuild=true

  # ── Gate 2: architecture tests ────────────────────────────────────────────
  architecture-tests:
    name: "Gate 2 — architecture tests"
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - name: Architecture tests
        run: >-
          dotnet test tests/Acta.ArchitectureTests/Acta.ArchitectureTests.csproj
          -c Release -p:ContinuousIntegrationBuild=true

  # ── Gate 3: mutation testing (Stryker.NET >= 80%) ─────────────────────────
  # On PRs the >=80% threshold is enforced on CHANGED code only (--since), so a
  # weakly tested new file cannot be masked by the aggregate score over the whole
  # core (an aggregate gate lets undertested new code slip through). Push to main:
  # full run as an aggregate trend/drift backstop.
  mutation:
    name: "Gate 3 — mutation (Stryker >= 80% on changed code)"
    runs-on: ubuntu-latest
    needs: architecture-tests
    steps:
      # fetch-depth: 0 + base fetch so Stryker's --since can diff PR changes against the base branch.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - name: Restore tools (dotnet-stryker)
        run: dotnet tool restore
      - name: Fetch base branch (diff-scoped mutation on PRs)
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags origin ${{ github.base_ref }}
      # Zero-mutant guard: green with 0 mutants, blocking (Stryker exit code, break=80 in
      # stryker-config.json) on real mutants. 0 mutants means either an empty skeleton or —
      # under --since on a PR — a change that touches no production code (test/docs-only).
      # We key on the presence of the report + the mutant count, NOT just on the JSON body.
      - name: Run Stryker (guarded)
        run: |
          set -uo pipefail
          set +e
          # PR: enforce >=80% on CHANGED code only (--since), so a weak new file cannot be
          # masked by the aggregate over the whole core. Push to main: full run for trend.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            dotnet stryker --since:origin/${{ github.base_ref }} > stryker.log 2>&1
          else
            dotnet stryker > stryker.log 2>&1
          fi
          stryker_exit=$?
          set -e
          tail -20 stryker.log || true
          report="$(find . -path '*/StrykerOutput/*/reports/mutation-report.json' -print -quit 2>/dev/null || true)"
          if [ -n "$report" ]; then
            total="$(jq '[.files[]?.mutants[]?] | length' "$report" 2>/dev/null || echo 0)"
            echo "Stryker: testable mutants=${total:-0} (Stryker exit code: ${stryker_exit})"
            if [ "${total:-0}" -eq 0 ]; then
              echo "Stryker: 0 mutants (empty skeleton) -> gate green"
              exit 0
            fi
            # Real mutants -> enforce the break=80 threshold from stryker-config.json (Stryker exit code).
            exit "${stryker_exit}"
          fi
          # No report: distinguish the known MTP incompatibility from a real failure (do not green blindly).
          if grep -q "Microsoft.Testing.Platform which is not yet supported by Stryker" stryker.log; then
            echo "::warning::Stryker 4.x does not support Microsoft.Testing.Platform (xUnit v3, issue #3094): the mutation gate does NOT enforce the >=80% threshold until this is resolved (switch the test projects to the VSTest bridge, or wait for MTP support in Stryker). Required before core code lands."
            exit 0
          fi
          echo "::error::Stryker finished without a report for an unknown reason (exit ${stryker_exit}) — gate red."
          exit "${stryker_exit}"

  # ── Gate 5: dependency scan (dotnet list --vulnerable) ────────────────────
  dependency-scan:
    name: "Gate 5 — dependency scan"
    runs-on: ubuntu-latest
    needs: mutation
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - name: Restore (locked)
        run: dotnet restore Acta.slnx -p:ContinuousIntegrationBuild=true
      # Guard: parse JSON (not grep) + pipefail — a fragile grep could pass green on a scan
      # error. Blocks on High/Critical vulnerabilities.
      - name: Vulnerable package scan
        run: |
          set -euo pipefail
          dotnet list Acta.slnx package --vulnerable --include-transitive --format json > vuln.json
          count="$(jq '[.projects[]?.frameworks[]? | ((.topLevelPackages // []) + (.transitivePackages // []))[] | .vulnerabilities[]? | select(.severity == "High" or .severity == "Critical")] | length' vuln.json)"
          echo "High/Critical vulnerabilities: ${count}"
          if [ "${count}" -gt 0 ]; then
            jq '.projects[]?.frameworks[]? | ((.topLevelPackages // []) + (.transitivePackages // []))[] | select(.vulnerabilities != null) | {id, resolvedVersion, vulnerabilities}' vuln.json
            echo "::error::Found ${count} packages with High/Critical vulnerabilities — PR blocked."
            exit 1
          fi
