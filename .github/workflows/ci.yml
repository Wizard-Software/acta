# CI — bramki jakości 1,2,3,5 (TESTING-SPEC.md §8), łańcuchowane `needs:` w kolejności.
# Bramka 4 (SAST/CodeQL) i 6 (sekrety) są w osobnych workflow (codeql.yml, secret-scan.yml).
# Kryterium QW2: pipeline zielony na pustym szkielecie solution.
# Akcje przypięte do SHA (SEC-1, determinizm R3-B4); Dependabot (github-actions) utrzymuje je.
name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_NOLOGO: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  # ── Bramka 1: Build + testy (in-memory + Testcontainers) ──────────────────
  build-test:
    name: "Gate 1 — build + tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      # Locked-mode restore: -p:ContinuousIntegrationBuild=true aktywuje RestoreLockedMode
      # z Directory.Build.props (walidacja packages.lock.json — determinizm grafu NuGet).
      - name: Restore (locked)
        run: dotnet restore Acta.slnx -p:ContinuousIntegrationBuild=true
      - name: Build (Release)
        run: dotnet build Acta.slnx -c Release --no-restore -p:ContinuousIntegrationBuild=true
      # ubuntu-latest ma Docker → Testcontainers (Postgres) zadziałają, gdy pojawią się
      # testy integracyjne. Na pustym szkielecie liczba testów = 0 → sukces.
      - name: Test (in-memory + Testcontainers)
        run: dotnet test Acta.slnx -c Release --no-build -p:ContinuousIntegrationBuild=true

  # ── Bramka 2: Testy architektury (AK-2, Owner.Target) ─────────────────────
  architecture-tests:
    name: "Gate 2 — architecture tests (AK-2)"
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - name: Architecture tests
        run: >-
          dotnet test tests/Acta.ArchitectureTests/Acta.ArchitectureTests.csproj
          -c Release -p:ContinuousIntegrationBuild=true

  # ── Bramka 3: Testy mutacyjne (Stryker.NET ≥ 80% na src/Acta, ADR-013) ─────
  mutation:
    name: "Gate 3 — mutation (Stryker >= 80%)"
    runs-on: ubuntu-latest
    needs: architecture-tests
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - name: Restore tools (dotnet-stryker)
        run: dotnet tool restore
      # Guard pustego szkieletu (GAP-2/RISK-1): bramka zielona przy 0 mutantów,
      # blokująca (kod wyjścia Stryker, break=80 w stryker-config.json) na realnym kodzie.
      # Kluczujemy na obecności raportu + liczbie mutantów, NIE tylko na treści JSON.
      - name: Run Stryker (guarded)
        run: |
          set -uo pipefail
          set +e
          dotnet stryker > stryker.log 2>&1
          stryker_exit=$?
          set -e
          tail -20 stryker.log || true
          report="$(find . -path '*/StrykerOutput/*/reports/mutation-report.json' -print -quit 2>/dev/null || true)"
          if [ -n "$report" ]; then
            total="$(jq '[.files[]?.mutants[]?] | length' "$report" 2>/dev/null || echo 0)"
            echo "Stryker: testowalne mutanty=${total:-0} (kod wyjścia Stryker: ${stryker_exit})"
            if [ "${total:-0}" -eq 0 ]; then
              echo "Stryker: 0 mutantów (pusty szkielet) -> bramka zielona"
              exit 0
            fi
            # Realne mutanty -> egzekwuj próg break=80 z stryker-config.json (kod wyjścia Stryker).
            exit "${stryker_exit}"
          fi
          # Brak raportu: rozróżnij znaną niekompatybilność MTP od realnej awarii (GAP-2 — nie greenować ślepo).
          if grep -q "Microsoft.Testing.Platform which is not yet supported by Stryker" stryker.log; then
            echo "::warning::Stryker 4.x nie wspiera Microsoft.Testing.Platform (xUnit v3, issue #3094): bramka mutacji NIE egzekwuje progu >=80% do czasu rozwiązania (przełączenie projektów testowych na most VSTest lub wsparcie MTP w Stryker). Wymagane przed kodem rdzenia (Feature 1)."
            exit 0
          fi
          echo "::error::Stryker zakończył się bez raportu z nieznanego powodu (kod ${stryker_exit}) — bramka czerwona."
          exit "${stryker_exit}"

  # ── Bramka 5: Skanowanie zależności (dotnet list --vulnerable) ────────────
  dependency-scan:
    name: "Gate 5 — dependency scan"
    runs-on: ubuntu-latest
    needs: mutation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - name: Restore (locked)
        run: dotnet restore Acta.slnx -p:ContinuousIntegrationBuild=true
      # Guard SEC-3: parsowanie JSON (nie grep) + pipefail — kruchy grep mógłby przejść
      # zielono przy błędzie skanu. Blokada na podatnościach High/Critical.
      - name: Vulnerable package scan
        run: |
          set -euo pipefail
          dotnet list Acta.slnx package --vulnerable --include-transitive --format json > vuln.json
          count="$(jq '[.projects[]?.frameworks[]? | ((.topLevelPackages // []) + (.transitivePackages // []))[] | .vulnerabilities[]? | select(.severity == "High" or .severity == "Critical")] | length' vuln.json)"
          echo "Podatności High/Critical: ${count}"
          if [ "${count}" -gt 0 ]; then
            jq '.projects[]?.frameworks[]? | ((.topLevelPackages // []) + (.transitivePackages // []))[] | select(.vulnerabilities != null) | {id, resolvedVersion, vulnerabilities}' vuln.json
            echo "::error::Znaleziono ${count} pakietów z podatnościami High/Critical — blokada PR."
            exit 1
          fi
